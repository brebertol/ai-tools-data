<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16182B;
    --muted:#8A8DA3;
    --line:#ECECF1;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'DM Sans',sans-serif;
    color:var(--ink);
    background:var(--white);
    display:flex;flex-direction:column;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:14px 22px;
    background:var(--white);
    border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:10;
  }
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;letter-spacing:-0.01em}
  .brand .sync{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .brand .sync::before{content:"";width:7px;height:7px;border-radius:50%;background:#34D399;display:inline-block}
  .spacer{flex:1}
  .search{
    display:flex;align-items:center;gap:8px;
    background:var(--white);border:1px solid var(--line);border-radius:999px;
    padding:7px 14px;min-width:230px;
  }
  .search svg{flex:none}
  .search input{
    border:none;background:transparent;outline:none;
    font-family:inherit;font-size:14px;color:var(--ink);width:100%;
  }
  .btn{
    font-family:inherit;font-size:13px;font-weight:500;color:var(--ink);
    background:var(--white);border:1px solid var(--line);border-radius:999px;
    padding:7px 14px;cursor:pointer;transition:background .15s;
  }
  .btn:hover{background:#F6F6F9}
  .btn:focus-visible,.search input:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .zoom{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .zoom button{
    font-family:inherit;font-size:15px;width:34px;height:32px;border:none;background:var(--white);
    cursor:pointer;color:var(--ink);
  }
  .zoom button:hover{background:#F6F6F9}
  .zoom button:focus-visible{outline:2px solid var(--ink);outline-offset:-2px}

  /* ---------- Canvas ---------- */
  #canvas{flex:1;overflow:auto;position:relative;background:var(--white)}
  #stage{transform-origin:0 0}
  svg{display:block}
  text{font-family:'DM Sans',sans-serif}
  .link{fill:none;stroke-width:1.7;stroke-linecap:round}
  .link.dim{stroke-opacity:.1 !important}

  .root-pill{fill:var(--ink)}
  .root-label{font-family:'Sora',sans-serif;font-weight:700;font-size:19px;fill:#fff}

  .cat text{font-size:16.5px;font-weight:700;cursor:pointer}
  .sub{cursor:pointer}
  .sub text.lbl{font-size:15px;font-weight:600}
  .sub .count-txt{font-size:11px;font-weight:700}

  .tool text{font-size:13px;font-weight:500;fill:var(--ink)}
  .tool.hit text{fill:#fff}
  .tool.linked{cursor:pointer}
  .tool.linked:hover rect{filter:brightness(.93)}

  .dim{opacity:.18}
  g.node,g.tool{transition:opacity .2s}

  @media (prefers-reduced-motion: no-preference){
    .pop{animation:pop .22s ease-out}
    @keyframes pop{from{opacity:0;transform:translateX(var(--dx,6px))}to{opacity:1;transform:none}}
  }
  @media (max-width:640px){
    header{gap:10px;padding:12px 14px}
    .search{min-width:150px;flex:1}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>AI Tools Library</h1>
    <span class="sync" id="syncNote">Synced from Notion</span>
  </div>
  <div class="spacer"></div>
  <label class="search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8A8DA3" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
    <input id="q" type="text" placeholder="Search tools…" aria-label="Search tools">
  </label>
  <button class="btn" id="expandAll">Expand all</button>
  <button class="btn" id="collapseAll">Collapse all</button>
  <div class="zoom" role="group" aria-label="Zoom">
    <button id="zoomOut" aria-label="Zoom out">−</button>
    <button id="zoomIn" aria-label="Zoom in">+</button>
  </div>
</header>

<div id="canvas"><div id="stage"></div></div>

<script>
/* =====================================================================
   DATA SOURCE — fetched live from GitHub via jsDelivr CDN.
   Make.com updates tools.json whenever Notion changes; this page
   always loads the latest version automatically.
   ===================================================================== */
const DATA_URL = "https://cdn.jsdelivr.net/gh/brebertol/ai-tools-data@main/tools.json";

let DATA = [];

/* Which categories sit on which side of the map.
   Categories found in DATA but not listed here are appended to the
   shorter side automatically, so new Notion categories still render. */
const SIDES = {
  left:  ["Marketing & Growth","Design & Creative","Automation","Human Resources"],
  right: ["Communication & Customer Service","Product Management","Academia & Research","Technology & IT"]
};

/* =====================================================================
   COLOR SYSTEM — one main color per category; every subcategory gets
   a subtone (same hue, stepped lightness) of its category color.
   New categories not listed here pull from FALLBACK_COLORS.
   ===================================================================== */
const CAT_COLORS = {
  "Marketing & Growth":               "#1E40AF", // dark blue
  "Design & Creative":                "#BE185D", // magenta
  "Automation":                       "#C2410C", // orange
  "Human Resources":                  "#047857", // green
  "Communication & Customer Service": "#6D28D9", // purple
  "Product Management":               "#0F766E", // teal
  "Academia & Research":              "#B45309", // amber
  "Technology & IT":                  "#334155"  // slate
};
const FALLBACK_COLORS = ["#9D174D","#3730A3","#065F46","#92400E","#155E75","#701A75"];

/* --- small HSL utilities for building subtones --- */
function hexToHsl(hex){
  const n = parseInt(hex.slice(1),16);
  const r=(n>>16&255)/255, g=(n>>8&255)/255, b=(n&255)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h=0,s=0; const l=(max+min)/2;
  if(max!==min){
    const d=max-min;
    s = l>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: h=(g-b)/d+(g<b?6:0); break;
      case g: h=(b-r)/d+2; break;
      default: h=(r-g)/d+4;
    }
    h*=60;
  }
  return {h, s:s*100, l:l*100};
}
const hsl = (c,dl=0,ds=0)=>`hsl(${c.h.toFixed(1)} ${Math.max(0,Math.min(100,c.s+ds)).toFixed(1)}% ${Math.max(0,Math.min(100,c.l+dl)).toFixed(1)}%)`;

let fallbackIdx = 0;
const catColorCache = new Map();
function catColor(cat){
  if(!catColorCache.has(cat)){
    const hex = CAT_COLORS[cat] || FALLBACK_COLORS[(fallbackIdx++)%FALLBACK_COLORS.length];
    catColorCache.set(cat, hexToHsl(hex));
  }
  return catColorCache.get(cat);
}
/* Subtone i of nSubs: same hue, lightness stepped up from the main color
   (kept ≤ 56% so labels stay readable on white). */
function subTone(cat,i,nSubs){
  const c = catColor(cat);
  const maxStep = Math.min(18, 56-c.l);
  const dl = nSubs>1 ? (i/(nSubs-1))*Math.max(6,maxStep) : Math.max(4,maxStep/2);
  return {h:c.h, s:c.s, l:Math.min(56, c.l+dl)};
}

/* ---------- Build tree from flat rows ---------- */
function buildTree(rows){
  const cats = new Map();
  for(const [tool,cat,sub,url] of rows){
    if(!cats.has(cat)) cats.set(cat,new Map());
    const subs = cats.get(cat);
    if(!subs.has(sub)) subs.set(sub,[]);
    subs.get(sub).push({name:tool, url:url||""});
  }
  return cats;
}

/* ---------- State ---------- */
const tree = buildTree(DATA);
const open = new Set();            // "cat||sub" keys of expanded subcategories
let query = "";
let zoom = 1;
const key = (c,s)=>c+"||"+s;

document.getElementById("syncNote").textContent =
  "Synced from Notion · " + DATA.length + " tools";

/* ---------- Real text measurement (prevents label overlaps) ---------- */
const mctx = document.createElement("canvas").getContext("2d");
function measure(text,size,weight){
  mctx.font = `${weight} ${size}px 'DM Sans', sans-serif`;
  return mctx.measureText(text).width;
}
const wCat  = t=>measure(t,16.5,700);
const wSub  = t=>measure(t,15,600);
const wTool = t=>measure(t,13,500);

/* ---------- Geometry constants ---------- */
const SUB_H = 44;                        // collapsed subcategory height
const TOOL_H = 30, TOOL_GAP = 7;
const SUB_GAP = 10, CAT_GAP = 34;
const DX_CAT = 235;                      // root edge → category label
const GAP_CAT_SUB = 90;                  // category label end → subcategory label
const GAP_SUB_BADGE = 21;                // label end → badge center
const GAP_BADGE_TOOL = 62;               // badge edge → tool pill
const PAD = 60;

function sideOrder(){
  const left=[...SIDES.left], right=[...SIDES.right];
  for(const c of tree.keys()){
    if(!left.includes(c) && !right.includes(c)){
      (left.length<=right.length?left:right).push(c);
    }
  }
  return {
    left:  left.filter(c=>tree.has(c)),
    right: right.filter(c=>tree.has(c))
  };
}

/* Layout one side vertically: y measured from 0 */
function layoutSide(catNames){
  let y = 0;
  const cats = [];
  for(const cat of catNames){
    const subsIn = tree.get(cat);
    const subs = [];
    let i = 0;
    const n = subsIn.size;
    for(const [sub,tools] of subsIn){
      const isOpen = open.has(key(cat,sub));
      const blockH = isOpen
        ? Math.max(SUB_H, tools.length*(TOOL_H+TOOL_GAP)+14)
        : SUB_H;
      subs.push({sub,tools,isOpen,yc:y+blockH/2,blockH,tone:subTone(cat,i++,n)});
      y += blockH + SUB_GAP;
    }
    y -= SUB_GAP;
    const yc = (subs[0].yc + subs[subs.length-1].yc)/2;
    cats.push({cat,subs,yc,color:catColor(cat)});
    y += CAT_GAP;
  }
  y -= CAT_GAP;
  return {cats,height:Math.max(y,0)};
}

/* Widest horizontal extent of a side (for the SVG width) */
function sideExtent(side){
  let ext = 0;
  for(const c of side.cats){
    const base = DX_CAT + wCat(c.cat) + GAP_CAT_SUB;
    for(const s of c.subs){
      let e = base + wSub(s.sub) + GAP_SUB_BADGE + 11;
      if(s.isOpen){
        e += 11 + GAP_BADGE_TOOL + Math.max(...s.tools.map(t=>wTool(t)+28));
      }
      ext = Math.max(ext,e);
    }
  }
  return ext;
}

/* ---------- SVG helpers ---------- */
const NS = "http://www.w3.org/2000/svg";
function el(name,attrs,parent){
  const n = document.createElementNS(NS,name);
  for(const k in attrs) n.setAttribute(k,attrs[k]);
  if(parent) parent.appendChild(n);
  return n;
}
/* Curve that always flows outward: x1 is the parent anchor (closer to the
   center), x2 the child anchor (farther out); control points sit at the
   horizontal midpoint so the line leaves and arrives horizontally. */
function curve(x1,y1,x2,y2,stroke,opacity,parent,dim){
  const mx = (x1+x2)/2;
  el("path",{class:"link"+(dim?" dim":""),stroke,"stroke-opacity":opacity,
    d:`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`},parent);
}

/* ---------- Render ---------- */
function render(){
  const {left,right} = sideOrder();
  const L = layoutSide(left);
  const R = layoutSide(right);
  const rootW = 250, rootH = 108;
  const H = Math.max(L.height,R.height,rootH) + PAD*2;
  const extL = sideExtent(L), extR = sideExtent(R);
  const cx = PAD + extL + rootW/2 + 20;
  const W = cx + rootW/2 + 20 + extR + PAD;
  const cyRoot = H/2;
  const lOff = cyRoot - L.height/2;
  const rOff = cyRoot - R.height/2;

  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  const svg = el("svg",{width:W,height:H,viewBox:`0 0 ${W} ${H}`,
    role:"img","aria-label":"AI tools mind map"});
  stage.appendChild(svg);
  const gLinks = el("g",{},svg);
  const gNodes = el("g",{},svg);

  const q = query.trim().toLowerCase();
  const matches = t => q && t.toLowerCase().includes(q);

  // Root pill — taller to accommodate the toggle button below the title
  el("rect",{class:"root-pill",x:cx-rootW/2,y:cyRoot-rootH/2,
    width:rootW,height:rootH,rx:36},gNodes);
  const rt = el("text",{class:"root-label",x:cx,y:cyRoot-22,
    "text-anchor":"middle","dominant-baseline":"central"},gNodes);
  rt.textContent = "AI Tools Library";

  // Expand / Collapse toggle button inside the root pill
  // Is every subcategory currently open?
  let totalSubs=0, openSubs=0;
  for(const [cat,subs] of tree) for(const sub of subs.keys()){totalSubs++;if(open.has(key(cat,sub)))openSubs++;}
  const allOpen = openSubs===totalSubs;
  const btnW=162, btnH=32, btnX=cx-btnW/2, btnY=cyRoot+4;
  const fo = el("foreignObject",{x:btnX,y:btnY,width:btnW,height:btnH},gNodes);
  const btn = document.createElement("button");
  btn.className = "root-toggle";
  btn.style.cssText = `width:${btnW}px;height:${btnH}px;border-radius:999px;border:none;
    background:rgba(255,255,255,0.18);color:#fff;font-family:'DM Sans',sans-serif;
    font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;
    justify-content:center;gap:6px;letter-spacing:0.01em;transition:background .15s;`;
  btn.innerHTML = allOpen
    ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6" transform="rotate(90 12 12)"/></svg> Collapse all`
    : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6" transform="rotate(-90 12 12)"/></svg> Expand all`;
  btn.addEventListener("mouseenter",()=>btn.style.background="rgba(255,255,255,0.28)");
  btn.addEventListener("mouseleave",()=>btn.style.background="rgba(255,255,255,0.18)");
  btn.addEventListener("click",()=>{
    if(allOpen){ open.clear(); }
    else { for(const [cat,subs] of tree) for(const sub of subs.keys()) open.add(key(cat,sub)); }
    render();
  });
  fo.appendChild(btn);

  /* dir = +1 draws to the right, -1 to the left.
     All anchors advance strictly outward from the center, so every
     flow line runs center → category → subcategory → tool. */
  function drawSide(side,dir,yOff){
    const rootEdgeX = cx + dir*(rootW/2);
    for(const c of side.cats){
      const catY = c.yc + yOff;
      const catW = wCat(c.cat);
      const catNear = cx + dir*DX_CAT;               // label edge facing center
      const catFar  = catNear + dir*catW;            // label edge facing outward
      const catCss  = hsl(c.color);
      const catDim  = q && !c.subs.some(s=>s.tools.some(t=>matches(t.name)));

      curve(rootEdgeX,cyRoot,catNear-dir*9,catY,catCss,0.8,gLinks,catDim);

      const gc = el("g",{class:"node cat"+(catDim?" dim":"")},gNodes);
      const ct = el("text",{x:catNear,y:catY,fill:catCss,
        "text-anchor":dir>0?"start":"end","dominant-baseline":"central"},gc);
      ct.textContent = c.cat;
      el("title",{},ct).textContent =
        "Click to expand or collapse all of “"+c.cat+"”";
      gc.addEventListener("click",()=>toggleCat(c));

      for(const s of c.subs){
        const subY   = s.yc + yOff;
        const lblW   = wSub(s.sub);
        const subNear = catFar + dir*GAP_CAT_SUB;    // label edge facing center
        const subFar  = subNear + dir*lblW;
        const tone    = hsl(s.tone);
        const toneBg  = hsl({h:s.tone.h,s:s.tone.s,l:96},0,-25);
        const subDim  = q && !s.tools.some(t=>matches(t.name));

        curve(catFar+dir*9,catY,subNear-dir*8,subY,tone,0.75,gLinks,subDim);

        const gs = el("g",{class:"node sub"+(subDim?" dim":""),tabindex:0,
          role:"button","aria-expanded":s.isOpen,
          "aria-label":s.sub+", "+s.tools.length+" tools"},gNodes);
        const st = el("text",{class:"lbl",x:subNear,y:subY,fill:tone,
          "text-anchor":dir>0?"start":"end","dominant-baseline":"central"},gs);
        st.textContent = s.sub;

        // count badge just past the outward end of the label
        const bx = subFar + dir*GAP_SUB_BADGE;
        el("circle",{class:"count-bg",cx:bx,cy:subY,r:11,
          fill:s.isOpen?tone:toneBg},gs);
        const cnt = el("text",{class:"count-txt",x:bx,y:subY,
          fill:s.isOpen?"#fff":tone,
          "text-anchor":"middle","dominant-baseline":"central"},gs);
        cnt.textContent = s.tools.length;

        const toggle = ()=>{ const k=key(c.cat,s.sub);
          open.has(k)?open.delete(k):open.add(k); render(); };
        gs.addEventListener("click",toggle);
        gs.addEventListener("keydown",e=>{
          if(e.key==="Enter"||e.key===" "){e.preventDefault();toggle();}});

        if(s.isOpen){
          const n = s.tools.length;
          const totalH = n*(TOOL_H+TOOL_GAP)-TOOL_GAP;
          let ty = subY - totalH/2 + TOOL_H/2;
          const anchorX = bx + dir*11;               // outward edge of badge
          for(const tool of s.tools){
            const {name:toolName, url:toolUrl} = tool;
            const tw = wTool(toolName)+28;
            const tx = anchorX + dir*GAP_BADGE_TOOL; // pill edge facing center
            const rectX = dir>0 ? tx : tx-tw;
            const hit = matches(toolName);
            curve(anchorX,subY,tx-dir*5,ty,tone,0.5,gLinks,q&&!hit);
            const gt = el("g",{class:"tool pop"+(hit?" hit":"")+(q&&!hit?" dim":""),
              style:"--dx:"+(dir>0?"-8px":"8px")},gNodes);
            el("rect",{x:rectX,y:ty-TOOL_H/2,width:tw,height:TOOL_H,
              rx:TOOL_H/2,fill:hit?tone:toneBg,
              stroke:tone,"stroke-opacity":hit?1:0.45,"stroke-width":1.2},gt);
            const tt = el("text",{x:rectX+tw/2,y:ty,
              "text-anchor":"middle","dominant-baseline":"central"},gt);
            tt.textContent = toolName;
            if(toolUrl){
              gt.setAttribute("tabindex","0");
              gt.setAttribute("role","link");
              gt.setAttribute("aria-label",toolName+" – visit website");
              el("title",{},gt).textContent="Open "+toolName+" ↗";
              gt.addEventListener("click",e=>{
                e.stopPropagation();
                window.open(toolUrl,"_blank","noopener,noreferrer");
              });
              gt.addEventListener("keydown",e=>{
                if(e.key==="Enter"||e.key===" "){
                  e.preventDefault();
                  window.open(toolUrl,"_blank","noopener,noreferrer");
                }
              });
            }
            ty += TOOL_H+TOOL_GAP;
          }
        }
      }
    }
  }

  drawSide(L,-1,lOff);
  drawSide(R, 1,rOff);
}

function toggleCat(c){
  const anyClosed = c.subs.some(s=>!open.has(key(c.cat,s.sub)));
  for(const s of c.subs){
    const k = key(c.cat,s.sub);
    anyClosed ? open.add(k) : open.delete(k);
  }
  render();
}

/* ---------- Controls ---------- */
document.getElementById("expandAll").addEventListener("click",()=>{
  for(const [cat,subs] of tree) for(const sub of subs.keys()) open.add(key(cat,sub));
  render();
});
document.getElementById("collapseAll").addEventListener("click",()=>{
  open.clear(); render();
});
document.getElementById("q").addEventListener("input",e=>{
  query = e.target.value;
  const q = query.trim().toLowerCase();
  if(q){
    for(const [cat,subs] of tree)
      for(const [sub,tools] of subs)
        if(tools.some(t=>t.name.toLowerCase().includes(q))) open.add(key(cat,sub));
  }
  render();
});
function setZoom(z){
  zoom = Math.min(1.6,Math.max(0.45,z));
  document.getElementById("stage").style.transform = "scale("+zoom+")";
}
document.getElementById("zoomIn").addEventListener("click",()=>setZoom(zoom+0.12));
document.getElementById("zoomOut").addEventListener("click",()=>setZoom(zoom-0.12));

/* Re-render once the real fonts are loaded so measured widths are exact,
   then fit the map to the viewport width. */
function fit(){
  const svg = document.querySelector("#stage svg");
  if(!svg) return;
  const cw = document.getElementById("canvas").clientWidth;
  const sw = svg.getAttribute("width");
  if(cw < sw) setZoom(cw/sw); 
}

/* =====================================================================
   INIT — fetch live data from GitHub, then render.
   Falls back to an empty state with a friendly error message.
   ===================================================================== */
async function init(){
  const canvas = document.getElementById("canvas");

  // Show a subtle loading indicator
  canvas.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;
    justify-content:center;height:100%;gap:14px;color:#8A8DA3;font-size:15px;">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#C4C6D4"
      stroke-width="2" stroke-linecap="round">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83
               M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83">
        <animateTransform attributeName="transform" type="rotate"
          from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/>
      </path>
    </svg>
    <span>Loading tools…</span>
  </div>`;

  try {
    // Add a cache-busting timestamp so we always get the freshest data
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if(!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    DATA.push(...json);

    // Restore canvas and render the map
    canvas.innerHTML = "<div id='stage'></div>";
    document.getElementById("syncNote").textContent =
      "Live from GitHub · " + DATA.length + " tools";

    render();
    if(document.fonts && document.fonts.ready){
      document.fonts.ready.then(()=>{ render(); fit(); });
    }
    fit();

  } catch(err) {
    canvas.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;
      justify-content:center;height:100%;gap:12px;color:#8A8DA3;font-size:15px;
